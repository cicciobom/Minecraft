<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minicraft JS - Fixed & Gemini Edition</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #7EC0EE;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none; user-select: none;
        }

        #game-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

        #damage-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 0, 0, 0.4); pointer-events: none; z-index: 50;
            opacity: 0; transition: opacity 0.2s;
        }

        /* MIRINO */
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 24px; height: 24px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: white;
            mix-blend-mode: difference;
        }
        #crosshair::before { width: 2px; height: 100%; left: 11px; }
        #crosshair::after { height: 2px; width: 100%; top: 11px; }

        /* HUD SUPERIORE */
        #top-hud {
            position: absolute; top: 15px; left: 50%;
            transform: translateX(-50%); display: flex;
            flex-direction: column; align-items: center; gap: 8px; z-index: 40;
        }

        #stats-bar {
            display: flex; justify-content: space-between; width: 380px;
            pointer-events: none; text-shadow: 2px 2px 0 #000;
        }
        .stat-group { display: flex; gap: 1px; letter-spacing: -3px; font-size: 20px; color: white; }

        #inventory {
            display: flex; gap: 5px; background: rgba(0,0,0,0.75);
            padding: 8px; border: 3px solid #333; border-radius: 4px;
        }
        .slot {
            width: 44px; height: 44px; border: 2px solid #555;
            display: flex; justify-content: center; align-items: center;
            font-size: 22px; position: relative; background: rgba(255,255,255,0.05);
            color: white; cursor: pointer;
        }
        .slot.active { border-color: #A4E57E; transform: scale(1.1); background: rgba(164, 229, 126, 0.2); box-shadow: 0 0 10px rgba(164, 229, 126, 0.5); }
        
        .slot-count {
            position: absolute; top: 1px; right: 2px; font-size: 11px;
            background: rgba(0,0,0,0.6); padding: 1px 3px; border-radius: 2px;
            color: #A4E57E; font-weight: bold;
        }
        .key-hint { position: absolute; bottom: 1px; left: 2px; font-size: 9px; color: #999; }

        /* BLOCCHI HUD */
        .block-preview { border-radius: 2px; width: 30px; height: 30px; }
        .color-1 { background: #5CA932; }
        .color-2 { background: #79553A; }
        .color-3 { background: #6b4c3a; }
        .color-4 { background: #337A20; }
        .color-5 { background: #7D7D7D; }

        /* CHAT AI */
        #ai-chat-overlay {
            position: absolute; bottom: 100px; left: 20px; width: 320px;
            background: rgba(0,0,0,0.85); border: 2px solid #444; border-radius: 8px;
            display: none; flex-direction: column; z-index: 100;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #chat-header { background: #222; padding: 10px; font-size: 12px; color: #A4E57E; border-bottom: 1px solid #444; display: flex; justify-content: space-between; font-weight: bold; }
        #chat-messages { height: 200px; overflow-y: auto; padding: 10px; font-size: 13px; color: #eee; display: flex; flex-direction: column; gap: 8px; }
        #chat-input-area { display: flex; padding: 5px; background: #111; border-top: 1px solid #444; border-radius: 0 0 8px 8px; }
        #chat-input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-family: inherit; }
        .msg-user { color: #A4E57E; text-align: right; }
        .msg-bot { color: #7EC0EE; text-align: left; background: rgba(255,255,255,0.05); padding: 6px; border-radius: 4px; line-height: 1.4; }

        /* MOBILE */
        #mobile-controls { display: none; }
        .is-mobile #mobile-controls { display: block; }
        #joystick {
            position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px;
            background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
        }
        #joystick-knob {
            position: absolute; top: 35px; left: 35px; width: 50px; height: 50px;
            background: rgba(255,255,255,0.4); border-radius: 50%;
        }
        #mobile-actions {
            position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 12px; align-items: flex-end;
        }
        .m-row { display: flex; gap: 12px; }
        .m-btn {
            width: 65px; height: 65px; border-radius: 50%; background: rgba(0,0,0,0.5);
            border: 2px solid white; color: white; display: flex; justify-content: center; align-items: center; font-size: 26px;
        }

        /* MENU */
        .overlay-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 20, 0.98); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; backdrop-filter: blur(10px);
        }
        .menu-btn {
            padding: 18px 60px; font-size: 20px; background: #333; color: white;
            border: 2px solid #555; border-radius: 6px; cursor: pointer;
            margin: 12px; width: 300px; text-transform: uppercase; font-weight: bold;
        }
        .menu-btn.primary { background: #4CAF50; border-color: #2E7D32; }
    </style>
</head>
<body>

    <div id="game-container"></div>
    <div id="damage-overlay"></div>
    <div id="crosshair"></div>

    <!-- HUD -->
    <div id="top-hud">
        <div id="stats-bar">
            <div class="stat-group" id="health-bar"></div>
            <div class="stat-group" id="food-bar"></div>
        </div>
        <div id="inventory"></div>
    </div>

    <!-- AI CHAT -->
    <div id="ai-chat-overlay">
        <div id="chat-header">
            <span>✨ SPIRITO DEL MONDO</span>
            <span style="cursor:pointer" id="close-chat">✕</span>
        </div>
        <div id="chat-messages">
            <div class="msg-bot">Saluti, costruttore. Come posso assisterti oggi? ✨</div>
        </div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Parla con Gemini...">
        </div>
    </div>

    <!-- MOBILE UI -->
    <div id="mobile-controls">
        <div id="joystick"><div id="joystick-knob"></div></div>
        <div id="mobile-actions">
            <div class="m-row">
                <div class="m-btn" id="m-chat">💬</div>
                <div class="m-btn" id="m-shift">S</div>
                <div class="m-btn" id="m-jump">▲</div>
            </div>
            <div class="m-row">
                <div class="m-btn" id="m-break">⛏️</div>
                <div class="m-btn" id="m-place">🧱</div>
            </div>
        </div>
    </div>

    <!-- MENUS -->
    <div id="start-screen" class="overlay-menu">
        <h1 style="color: #A4E57E; font-size: 60px;">MINICRAFT AI</h1>
        <p style="opacity: 0.8; margin-bottom: 40px;">Mondo Infinito • Assistenza AI • Fixed Movement</p>
        <button id="start-btn" class="menu-btn primary">Inizia Partita</button>
    </div>

    <div id="pause-menu" class="overlay-menu" style="display:none">
        <h2 style="font-size: 40px; margin-bottom: 40px;">GIOCO IN PAUSA</h2>
        <button id="resume-btn" class="menu-btn primary">Torna al Gioco</button>
        <button id="main-menu-btn" class="menu-btn">Menu Principale</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js';

        // --- GEMINI API ---
        const apiKey = ""; 
        const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";

        async function callGemini(userQuery) {
            const systemPrompt = "Sei lo Spirito del Mondo di Minicraft. Il giocatore è in un mondo infinito. Rispondi in italiano in modo breve (max 3 frasi) e magico. Aiuta con consigli di scavo o costruzione.";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text || "Lo spirito è stanco...";
            } catch (error) {
                return "La connessione con il regno astrale è debole.";
            }
        }

        // --- VARIABILI GIOCO ---
        let scene, camera, renderer;
        let yawObject, pitchObject, bobbingNode, handGroup;
        let velocity = new THREE.Vector3();
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let canJump = false, isTouchDevice = false, isShifting = false;
        let gamePaused = true, isChatting = false;

        let targetYaw = 0, targetPitch = 0;
        let currentYaw = 0, currentPitch = 0;

        const PLAYER_HEIGHT = 1.6, PLAYER_RADIUS = 0.35;
        const WALK_SPEED = 5.2, SHIFT_SPEED = 2.2;
        const CHUNK_SIZE = 16, RENDER_DIST = 2;

        const world = new Map();
        const generatedChunks = new Set();
        const blockMeshes = {};
        let blockMaterials = {}, selectedSlotIndex = 6; 

        let inventory = [
            { type: null, count: 0 }, { type: null, count: 0 }, { type: null, count: 0 },
            { type: null, count: 0 }, { type: null, count: 0 },
            { type: 6, count: 1 },    // Mela
            { type: 7, count: 1 },    // Piccone
            { type: 8, count: 1 }     // Ascia
        ];

        let floatingDrops = [];
        const dropGeometry = new THREE.BoxGeometry(0.2, 0.2, 0.2);

        let isMining = false, mineProgress = 0, mineTarget = null, requiredTime = 1;
        const BLOCK_PROPS = { 
            1: { h: 0.8, t: 'dirt' }, 2: { h: 0.7, t: 'dirt' }, 
            3: { h: 2.2, t: 'wood' }, 4: { h: 0.3, t: 'leaf' }, 5: { h: 4.0, t: 'stone' } 
        };
        const TOOL_SPEEDS = { 7: { target: 'stone', s: 7 }, 8: { target: 'wood', s: 6 } };
        let crackMaterials = [], crackMesh;

        let health = 10, food = 10, foodTimer = 0, lastVelY = 0;

        init();
        animate();

        function init() {
            isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            if (isTouchDevice) document.body.classList.add('is-mobile');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x7EC0EE);
            scene.fog = new THREE.FogExp2(0x7EC0EE, 0.02);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 400);
            pitchObject = new THREE.Object3D(); pitchObject.add(camera);
            bobbingNode = new THREE.Object3D(); bobbingNode.add(pitchObject);
            yawObject = new THREE.Object3D(); yawObject.add(bobbingNode);
            scene.add(yawObject);

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.getElementById('game-container').appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.7); scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 0.8); sun.position.set(50, 150, 50); 
            sun.castShadow = true; scene.add(sun);

            setupAssets();
            setupMiningFX();
            checkChunks(0, 0, true);
            spawnPlayer();
            setupControls();
            renderInventoryUI();
            updateHUD();

            window.addEventListener('resize', onResize);
            
            // RESET INPUT SE FINESTRA PERDE FOCUS (Previene bug movimento bloccato)
            window.addEventListener('blur', () => {
                moveForward = moveBackward = moveLeft = moveRight = isShifting = false;
            });
        }

        function setupAssets() {
            const createTex = (c1, c2, grass) => {
                const canvas = document.createElement('canvas'); canvas.width = 16; canvas.height = 16;
                const ctx = canvas.getContext('2d'); ctx.fillStyle = c1; ctx.fillRect(0,0,16,16);
                for(let i=0; i<25; i++) { ctx.fillStyle = c2; ctx.fillRect(Math.random()*16, Math.random()*16, 1, 1); }
                if(grass) { ctx.fillStyle = '#5CA932'; ctx.fillRect(0,0,16,4); }
                const tex = new THREE.CanvasTexture(canvas); tex.magFilter = THREE.NearestFilter; return tex;
            };
            const tG_S = createTex('#79553A', '#5E402A', true), tG_T = createTex('#5CA932', '#4A8E26', false);
            const tD = createTex('#79553A', '#5E402A', false), tS = createTex('#7D7D7D', '#636363', false);
            const tW_S = createTex('#5C4033', '#402B21', false), tW_T = createTex('#C19A6B', '#A48058', false);
            const tL = createTex('#337A20', '#255917', false);
            const m = (tex, trans) => new THREE.MeshLambertMaterial({map: tex, transparent: trans || false, opacity: trans ? 0.85 : 1});

            blockMaterials = {
                1: [m(tG_S), m(tG_S), m(tG_T), m(tD), m(tG_S), m(tG_S)],
                2: m(tD), 3: [m(tW_S), m(tW_S), m(tW_T), m(tW_T), m(tW_S), m(tW_S)],
                4: m(tL, true), 5: m(tS), 6: new THREE.MeshLambertMaterial({color: 0xcc2222})
            };

            for(let i=1; i<=5; i++) {
                const inst = new THREE.InstancedMesh(new THREE.BoxGeometry(1,1,1), blockMaterials[i], 50000);
                inst.count = 0; inst.receiveShadow = true; inst.castShadow = true;
                scene.add(inst); blockMeshes[i] = inst;
            }

            handGroup = new THREE.Group(); handGroup.position.set(0.5, -0.4, -0.7);
            pitchObject.add(handGroup);
            updateHandVisual(inventory[selectedSlotIndex].type);

            window.blockHL = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(1.01, 1.01, 1.01)), new THREE.LineBasicMaterial({color: 0, transparent: true, opacity: 0.4}));
            scene.add(window.blockHL);
        }

        function setupMiningFX() {
            for(let i=0; i<5; i++) {
                const canv = document.createElement('canvas'); canv.width = 32; canv.height = 32;
                const ctx = canv.getContext('2d'); ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.lineWidth = 2;
                if(i > 0) for(let j=0; j<i*12; j++) { ctx.beginPath(); let x=Math.random()*32, y=Math.random()*32; ctx.moveTo(x,y); ctx.lineTo(x+Math.random()*10-5, y+Math.random()*10-5); ctx.stroke(); }
                const t = new THREE.CanvasTexture(canv); t.magFilter = THREE.NearestFilter;
                crackMaterials.push(new THREE.MeshBasicMaterial({map:t, transparent:true, polygonOffset:true, polygonOffsetFactor:-1}));
            }
            crackMesh = new THREE.Mesh(new THREE.BoxGeometry(1.02, 1.02, 1.02), crackMaterials[0]);
            crackMesh.visible = false; scene.add(crackMesh);
        }

        // --- WORLD ---
        function setBlock(x,y,z,t) { world.set(`${x},${y},${z}`, t); }
        function hasBlock(x,y,z) { return world.has(`${x},${y},${z}`); }
        function getBlock(x,y,z) { return world.get(`${x},${y},${z}`); }

        function checkChunks(px, pz, force) {
            const cx = Math.floor(px/CHUNK_SIZE), cz = Math.floor(pz/CHUNK_SIZE);
            if(force || cx !== window.lastCX || cz !== window.lastCZ) {
                window.lastCX = cx; window.lastCZ = cz;
                for(let x = cx-RENDER_DIST; x <= cx+RENDER_DIST; x++) {
                    for(let z = cz-RENDER_DIST; z <= cz+RENDER_DIST; z++) {
                        const key = `${x},${z}`;
                        if(!generatedChunks.has(key)) {
                            for(let lx=0; lx<CHUNK_SIZE; lx++) for(let lz=0; lz<CHUNK_SIZE; lz++) {
                                let gx = x*CHUNK_SIZE+lx, gz = z*CHUNK_SIZE+lz;
                                let h = Math.floor(Math.sin(gx*0.1)*Math.cos(gz*0.1)*4 + Math.sin((gx+gz)*0.04)*3);
                                for(let y=h-3; y<=h; y++) setBlock(gx,y,gz, y===h?1:(y<h-2?5:2));
                                if(Math.random()>0.99) {
                                    const th = 4+Math.floor(Math.random()*2);
                                    for(let i=0; i<th; i++) setBlock(gx,h+1+i,gz,3);
                                    for(let ax=-2; ax<=2; ax++) for(let ay=th-2; ay<=th+1; ay++) for(let az=-2; az<=2; az++)
                                        if(Math.abs(ax)+Math.abs(az)+(ay-th+1) <= 3 && !hasBlock(gx+ax,h+1+ay,gz+az)) setBlock(gx+ax,h+1+ay,gz+az,4);
                                }
                            }
                            generatedChunks.add(key);
                        }
                    }
                }
                updateMeshes();
            }
        }

        function updateMeshes() {
            for(let i=1; i<=5; i++) blockMeshes[i].count = 0;
            const dummy = new THREE.Object3D();
            const minX = (window.lastCX-3)*16, maxX = (window.lastCX+3)*16, minZ = (window.lastCZ-3)*16, maxZ = (window.lastCZ+3)*16;
            world.forEach((t, k) => {
                const [x,y,z] = k.split(',').map(Number);
                if(x>=minX && x<maxX && z>=minZ && z<maxZ) {
                    const m = blockMeshes[t]; if(m && m.count < 50000) {
                        dummy.position.set(x,y,z); dummy.updateMatrix(); m.setMatrixAt(m.count++, dummy.matrix);
                    }
                }
            });
            for(let i=1; i<=5; i++) blockMeshes[i].instanceMatrix.needsUpdate = true;
        }

        // --- DROPS ---
        function spawnDrop(x, y, z, type) {
            const mat = Array.isArray(blockMaterials[type]) ? blockMaterials[type][0] : blockMaterials[type];
            const mesh = new THREE.Mesh(dropGeometry, mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            floatingDrops.push({ mesh, type });
        }

        function handleDropsPickup() {
            const playerPos = yawObject.position.clone(); playerPos.y -= 1.0;
            for (let i = floatingDrops.length - 1; i >= 0; i--) {
                const drop = floatingDrops[i];
                drop.mesh.rotation.y += 0.05;
                drop.mesh.position.y += Math.sin(Date.now() * 0.005) * 0.001;
                if (playerPos.distanceTo(drop.mesh.position) < 1.35) {
                    if (addToInventory(drop.type)) {
                        scene.remove(drop.mesh); floatingDrops.splice(i, 1); renderInventoryUI();
                    }
                }
            }
        }

        function addToInventory(type) {
            for (let item of inventory) if (item.type === type && item.count < 64) { item.count++; return true; }
            for (let i = 0; i < 5; i++) if (inventory[i].type === null) { inventory[i].type = type; inventory[i].count = 1; return true; }
            return false;
        }

        // --- CONTROLLI ---
        function setupControls() {
            const ray = new THREE.Raycaster();
            const getRayHit = () => {
                ray.setFromCamera({x:0, y:0}, camera); ray.far = 5.5;
                const its = ray.intersectObjects(Object.values(blockMeshes));
                if(its.length > 0) {
                    const hit = its[0];
                    return { x: Math.round(hit.point.x - hit.face.normal.x * 0.1), y: Math.round(hit.point.y - hit.face.normal.y * 0.1), z: Math.round(hit.point.z - hit.face.normal.z * 0.1), normal: hit.face.normal };
                }
                return null;
            };

            const toggleMenus = (paused) => {
                gamePaused = paused;
                document.getElementById('pause-menu').style.display = paused ? 'flex' : 'none';
                if (!paused) {
                    moveForward = moveBackward = moveLeft = moveRight = false;
                    if (!isTouchDevice) document.body.requestPointerLock();
                }
            };

            document.getElementById('start-btn').onclick = () => {
                document.getElementById('start-screen').style.display='none';
                toggleMenus(false);
            };
            document.getElementById('resume-btn').onclick = () => toggleMenus(false);
            document.getElementById('main-menu-btn').onclick = () => location.reload();

            document.addEventListener('pointerlockchange', () => {
                if (document.pointerLockElement !== document.body && !gamePaused && !isTouchDevice && !isChatting) {
                    toggleMenus(true);
                }
            });

            // TASTIERA
            window.addEventListener('keydown', e => {
                if(isChatting) return;
                if(e.key.toLowerCase() === 't') { toggleChat(true); return; }
                if(gamePaused) return;
                
                if(e.code==='KeyW') moveForward=true; if(e.code==='KeyS') moveBackward=true;
                if(e.code==='KeyA') moveLeft=true; if(e.code==='KeyD') moveRight=true;
                if(e.code==='Space') jump();
                if(e.code==='ShiftLeft') isShifting = true;
                if(e.key >= '1' && e.key <= '8') selectSlot(parseInt(e.key)-1);
            });
            window.addEventListener('keyup', e => {
                if(e.code==='KeyW') moveForward=false; if(e.code==='KeyS') moveBackward=false;
                if(e.code==='KeyA') moveLeft=false; if(e.code==='KeyD') moveRight=false;
                if(e.code==='ShiftLeft') isShifting = false;
            });

            // ROTELLINA
            window.addEventListener('wheel', e => {
                if(gamePaused || isChatting) return;
                let newIdx = selectedSlotIndex + (e.deltaY > 0 ? 1 : -1);
                if (newIdx > 7) newIdx = 0; if (newIdx < 0) newIdx = 7;
                selectSlot(newIdx);
            }, { passive: true });

            // MOUSE
            window.addEventListener('mousemove', e => {
                if(document.pointerLockElement === document.body && !isChatting) {
                    targetYaw -= e.movementX * 0.0016;
                    targetPitch = Math.max(-1.5, Math.min(1.5, targetPitch - e.movementY * 0.0016));
                }
            });
            window.addEventListener('mousedown', e => {
                if(gamePaused || isChatting || (!isTouchDevice && document.pointerLockElement !== document.body)) return;
                if(e.button === 0) { isMining = true; mineProgress = 0; swing(); } 
                else if(e.button === 2) placeBlock(); 
            });
            window.addEventListener('mouseup', e => { if(e.button === 0) stopMining(); });

            // MOBILE
            document.getElementById('m-jump').onclick = e => { e.preventDefault(); jump(); };
            document.getElementById('m-shift').onclick = e => { e.preventDefault(); isShifting = !isShifting; };
            document.getElementById('m-break').ontouchstart = e => { e.preventDefault(); isMining = true; mineProgress = 0; swing(); };
            document.getElementById('m-break').ontouchend = e => { e.preventDefault(); stopMining(); };
            document.getElementById('m-place').onclick = e => { e.preventDefault(); placeBlock(); };
            document.getElementById('m-chat').onclick = e => { e.preventDefault(); toggleChat(true); };

            // CHAT LOGIC
            const toggleChat = (show) => {
                isChatting = show;
                document.getElementById('ai-chat-overlay').style.display = show ? 'flex' : 'none';
                if(show) {
                    moveForward = moveBackward = moveLeft = moveRight = false;
                    document.getElementById('chat-input').focus();
                    if(document.pointerLockElement) document.exitPointerLock();
                } else {
                    if(!gamePaused && !isTouchDevice) document.body.requestPointerLock();
                }
            };

            document.getElementById('close-chat').onclick = () => toggleChat(false);
            document.getElementById('chat-input').onkeydown = async (e) => {
                if(e.key === 'Enter') {
                    const txt = e.target.value.trim(); if(!txt) { toggleChat(false); return; }
                    const msgBox = document.getElementById('chat-messages');
                    msgBox.innerHTML += `<div class="msg-user">${txt}</div>`;
                    e.target.value = ''; msgBox.scrollTop = msgBox.scrollHeight;
                    const reply = await callGemini(txt);
                    msgBox.innerHTML += `<div class="msg-bot">${reply}</div>`;
                    msgBox.scrollTop = msgBox.scrollHeight;
                }
            };

            // JOYSTICK
            const jKnob = document.getElementById('joystick-knob');
            let tidJoy = null;
            document.getElementById('joystick').ontouchstart = e => { e.preventDefault(); tidJoy = e.changedTouches[0].identifier; };
            document.getElementById('joystick').ontouchmove = e => {
                if(tidJoy === null || gamePaused || isChatting) return;
                for(let t of e.changedTouches) if(t.identifier === tidJoy) {
                    let rect = document.getElementById('joystick').getBoundingClientRect();
                    let dx = t.clientX - (rect.left+60), dy = t.clientY - (rect.top+60);
                    let d = Math.sqrt(dx*dx+dy*dy); if(d>40) { dx=(dx/d)*40; dy=(dy/d)*40; }
                    jKnob.style.transform = `translate(${dx}px, ${dy}px)`;
                    moveForward = dy < -10; moveBackward = dy > 10; moveLeft = dx < -10; moveRight = dx > 10;
                }
            };
            document.getElementById('joystick').ontouchend = () => { tidJoy=null; jKnob.style.transform=''; moveForward=moveBackward=moveLeft=moveRight=false; };

            window.jump = () => { if(canJump) { velocity.y = 8.8; canJump = false; } };
            window.stopMining = () => { isMining = false; mineTarget = null; crackMesh.visible = false; };
            window.placeBlock = () => {
                const item = inventory[selectedSlotIndex];
                if(item.type === 6 && item.count > 0) { 
                    if(food < 10) { food++; updateHUD(); swing(); item.count--; if(item.count<=0) item.type=null; renderInventoryUI(); } 
                    return; 
                }
                const hit = getRayHit();
                if(hit && item.type && item.type <= 5 && item.count > 0) {
                    const nx = hit.x + hit.normal.x, ny = hit.y + hit.normal.y, nz = hit.z + hit.normal.z;
                    const pPos = yawObject.position;
                    if(new THREE.Vector3(nx, ny, nz).distanceTo(new THREE.Vector3(pPos.x, ny, pPos.z)) > 0.65 && !hasBlock(nx, ny, nz)) {
                        setBlock(nx, ny, nz, item.type); updateMeshes();
                        item.count--; if(item.count <= 0) item.type = null;
                        renderInventoryUI(); updateHandVisual(item.type); swing();
                    }
                }
            };
            window.getRayHit = getRayHit;
            document.addEventListener('contextmenu', e => e.preventDefault());
        }

        // --- UI ---
        function renderInventoryUI() {
            const invContainer = document.getElementById('inventory'); invContainer.innerHTML = '';
            inventory.forEach((item, index) => {
                const slot = document.createElement('div');
                slot.className = `slot ${index === selectedSlotIndex ? 'active' : ''}`;
                if(item.type && item.type <= 5) {
                    const blockDiv = document.createElement('div'); blockDiv.className = 'block-preview color-' + item.type; slot.appendChild(blockDiv);
                } else if(item.type) {
                    slot.innerText = item.type === 6 ? '🍎' : (item.type === 7 ? '⛏️' : '🪓');
                }
                if (item.count > 1) {
                    const count = document.createElement('span'); count.className = 'slot-count'; count.innerText = `X${item.count}`; slot.appendChild(count);
                }
                const hint = document.createElement('span'); hint.className = 'key-hint'; hint.innerText = index + 1; slot.appendChild(hint);
                slot.onclick = () => selectSlot(index); invContainer.appendChild(slot);
            });
        }

        function selectSlot(idx) { selectedSlotIndex = idx; renderInventoryUI(); updateHandVisual(inventory[idx].type); }

        function updateHandVisual(type) {
            while(handGroup.children.length > 0) handGroup.remove(handGroup.children[0]);
            const hM = new THREE.MeshLambertMaterial({color: 0x5C4033}), tM = new THREE.MeshLambertMaterial({color: 0x888888});
            if(type <= 5 && type !== null) {
                handGroup.add(new THREE.Mesh(new THREE.BoxGeometry(0.3,0.3,0.3), blockMaterials[type]));
            } else if(type === 6) {
                handGroup.add(new THREE.Mesh(new THREE.BoxGeometry(0.2,0.2,0.2), blockMaterials[6]));
            } else if(type === 7) {
                const h = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.6, 0.04), hM); h.rotation.x = -Math.PI/2;
                const c = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.1, 0.1), tM); c.position.set(0,0,-0.3);
                const l = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.06, 0.08), tM); l.position.set(-0.12, 0, -0.3); l.rotation.y = 0.3;
                const r = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.06, 0.08), tM); r.position.set(0.12, 0, -0.3); r.rotation.y = -0.3;
                handGroup.add(h, c, l, r);
            } else if(type === 8) {
                const h = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.6, 0.04), hM); h.rotation.x = -Math.PI/2;
                const b = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.35, 0.25), tM); b.position.set(0.06, 0, -0.3); handGroup.add(h, b);
            }
        }

        // --- PHYSICS & LOOP ---
        function checkCollision(pos) {
            const r = PLAYER_RADIUS, h = isShifting ? 1.3 : PLAYER_HEIGHT;
            const xM = Math.floor(pos.x-r+0.5), xX = Math.floor(pos.x+r+0.5);
            const yM = Math.floor(pos.y-h+0.5), yX = Math.floor(pos.y+0.2);
            const zM = Math.floor(pos.z-r+0.5), zX = Math.floor(pos.z+r+0.5);
            for(let x=xM; x<=xX; x++) for(let y=yM; y<=yX; y++) for(let z=zM; z<=zX; z++) if(hasBlock(x,y,z)) return true;
            return false;
        }

        function swing() { if(!window.isSwinging) { window.isSwinging = true; window.swingP = 0; } }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const dt = Math.min((time - (window.lt || time))/1000, 0.1); window.lt = time;

            if(!gamePaused) {
                if(!isChatting) {
                    currentYaw += (targetYaw - currentYaw) * 15 * dt;
                    currentPitch += (targetPitch - currentPitch) * 15 * dt;
                    yawObject.rotation.y = currentYaw; pitchObject.rotation.x = currentPitch;
                }
                const tBobY = isShifting ? -0.25 : 0;
                bobbingNode.position.y += (tBobY - bobbingNode.position.y) * 10 * dt;

                checkChunks(yawObject.position.x, yawObject.position.z);
                handleDropsPickup();
                
                if(window.isSwinging) {
                    window.swingP += dt * 25;
                    if(window.swingP >= Math.PI) { window.isSwinging = false; handGroup.rotation.x = 0; }
                    else { handGroup.rotation.x = -Math.sin(window.swingP)*1.0; handGroup.position.z = -0.7 - Math.sin(window.swingP)*0.2; }
                }

                if(isMining) {
                    const hit = window.getRayHit();
                    if(hit) {
                        const id = `${hit.x},${hit.y},${hit.z}`;
                        if(mineTarget !== id) {
                            mineTarget = id; mineProgress = 0;
                            const bType = getBlock(hit.x, hit.y, hit.z);
                            let sMult = 1; const tool = inventory[selectedSlotIndex];
                            if(TOOL_SPEEDS[tool.type] && TOOL_SPEEDS[tool.type].target === BLOCK_PROPS[bType].t) sMult = TOOL_SPEEDS[tool.type].s;
                            requiredTime = BLOCK_PROPS[bType].h / sMult;
                            crackMesh.position.set(hit.x, hit.y, hit.z); crackMesh.visible = true;
                        }
                        mineProgress += dt; if(!window.isSwinging) swing();
                        const s = Math.floor((mineProgress/requiredTime)*5);
                        if(s>=0 && s<=4) crackMesh.material = crackMaterials[s];
                        if(mineProgress >= requiredTime) { 
                            const bt = getBlock(hit.x, hit.y, hit.z);
                            world.delete(id); spawnDrop(hit.x, hit.y, hit.z, bt);
                            updateMeshes(); window.stopMining(); isMining=true; 
                        }
                    } else window.stopMining();
                }

                const looked = window.getRayHit();
                if(looked && inventory[selectedSlotIndex].type <= 5 && inventory[selectedSlotIndex].type !== null && !isMining) { window.blockHL.position.set(looked.x, looked.y, looked.z); window.blockHL.visible = true; }
                else window.blockHL.visible = false;

                const cSpeed = isShifting ? SHIFT_SPEED : WALK_SPEED;
                let dir = new THREE.Vector3(Number(moveRight)-Number(moveLeft), 0, Number(moveBackward)-Number(moveForward)).normalize();
                dir.applyEuler(new THREE.Euler(0, currentYaw, 0));
                velocity.x += (dir.x * cSpeed - velocity.x) * 15 * dt;
                velocity.z += (dir.z * cSpeed - velocity.z) * 15 * dt;
                velocity.y -= 26 * dt; 

                const p = yawObject.position;
                p.x += velocity.x * dt; if(checkCollision(p)) { p.x -= velocity.x * dt; velocity.x = 0; }
                p.z += velocity.z * dt; if(checkCollision(p)) { p.z -= velocity.z * dt; velocity.z = 0; }
                p.y += velocity.y * dt;
                if(checkCollision(p)) {
                    p.y -= velocity.y * dt;
                    if(velocity.y < 0) { canJump = true; if(lastVelY < -15) takeDamage(Math.floor(Math.abs(lastVelY+15)/2)); }
                    velocity.y = 0;
                } else canJump = false;
                lastVelY = velocity.y;
                if(p.y < -30) { spawnPlayer(); takeDamage(5); velocity.set(0,0,0); }
                if(dir.lengthSq()>0.1 && canJump) foodTimer += dt;
                if(foodTimer > 25) { food = Math.max(0, food - 1); foodTimer = 0; updateHUD(); }
            }
            renderer.render(scene, camera);
        }

        function updateHUD() {
            let hp = ''; for(let i=0; i<10; i++) hp += (i < health) ? '❤️' : '🖤';
            document.getElementById('health-bar').innerHTML = hp;
            let fd = ''; for(let i=0; i<10; i++) fd += (i < food) ? '🍖' : '🦴';
            document.getElementById('food-bar').innerHTML = fd;
        }

        function takeDamage(amt) {
            health = Math.max(0, health - amt);
            document.getElementById('damage-overlay').style.opacity = '0.5';
            setTimeout(() => document.getElementById('damage-overlay').style.opacity = '0', 200);
            updateHUD(); if(health <= 0) location.reload();
        }

        function spawnPlayer() {
            for(let y=40; y>-10; y--) if(hasBlock(0,y,0)) { yawObject.position.set(0, y+1.5+PLAYER_HEIGHT, 0); return; }
            yawObject.position.set(0, 15, 0);
        }

        function onResize() { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
    </script>
</body>
